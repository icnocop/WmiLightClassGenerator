name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publishNuGet:
        description: 'Publish NuGet packages to NuGet.org'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      publishRelease:
        description: 'Publish as stable (non-prerelease) version'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Set version
      shell: pwsh
      run: |
        $majorVersion = 1
        $minorVersion = 0
        $firstBuildYear = 2026
        $currentDate = (Get-Date).ToUniversalTime()
        $buildYear = [int]$currentDate.ToString("yyyy")
        $currentMonthDay = $currentDate.ToString("MMdd")
        $buildVersion = (($buildYear - $firstBuildYear) * 1200) + [int]$currentMonthDay
        $dateTimeStamp = $currentDate.ToString("yyyy-MM-dd'T'HH-mm-ss'Z'")
        $runNumber = "${{ github.run_number }}"
        $baseVersion = "$majorVersion.$minorVersion.$buildVersion"
        $assemblyVersion = "$baseVersion.$runNumber"
        $isRelease = "${{ github.event.inputs.publishRelease }}" -eq "true"
        if ($isRelease) {
          $packageVersion = $baseVersion
        } else {
          $packageVersion = "$baseVersion-ci.$dateTimeStamp.$runNumber"
        }
        echo "VERSION=$assemblyVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf-8 -Append
        echo "PACKAGE_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf-8 -Append
        echo "IS_RELEASE=$isRelease" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf-8 -Append
        Write-Host "Assembly version: $assemblyVersion"
        Write-Host "Package version: $packageVersion"

    - name: Restore
      run: dotnet restore WmiLightClassGenerator.slnx

    - name: Build
      run: dotnet build WmiLightClassGenerator.slnx --configuration Release --no-restore /p:Version=${{ env.VERSION }} /p:PackageVersion=${{ env.PACKAGE_VERSION }}

    - name: Test
      run: dotnet test WmiLightClassGenerator.slnx --configuration Release --no-build --verbosity normal

    - name: Pack
      run: dotnet pack WmiLightClassGenerator.slnx --configuration Release --no-build -o ./artifacts /p:PackageVersion=${{ env.PACKAGE_VERSION }}

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WmiLightClassGenerator.${{ env.PACKAGE_VERSION }}
        path: ./artifacts/*.nupkg

    - name: Publish to NuGet
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.publishNuGet == 'true'
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
      run: |
        $PSNativeCommandUseErrorActionPreference = $true
        dotnet nuget push ./artifacts/*.nupkg --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY
        git tag v${{ env.PACKAGE_VERSION }}
        git push origin v${{ env.PACKAGE_VERSION }}

    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch' && github.event.inputs.publishNuGet == 'true'
      uses: softprops/action-gh-release@v2
      with:
        name: v${{ env.PACKAGE_VERSION }}
        tag_name: v${{ env.PACKAGE_VERSION }}
        generate_release_notes: true
        draft: false
        prerelease: ${{ env.IS_RELEASE != 'True' }}
        files: ./artifacts/*.nupkg
